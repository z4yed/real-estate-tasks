services:
  app:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - app-storage:/var/www/html/storage
      - ./docker/php/opcache-dev.ini:/usr/local/etc/php/conf.d/zz-opcache-dev.ini:ro
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  vite:
    image: node:24-alpine
    working_dir: /var/www/html
    ports:
      - '${VITE_PORT:-5173}:5173'
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - '${APP_PORT:-8080}:80'
    volumes:
      - .:/var/www/html:ro
      - app-storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - app

  mysql:
    image: mysql/mysql-server:8.0
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-p${DB_PASSWORD}'
      retries: 5
      timeout: 5s

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 5
      timeout: 5s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-storage:
  mysql-data:
  redis-data:
  node-modules:
