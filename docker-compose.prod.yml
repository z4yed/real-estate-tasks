services:
  app:
    image: ${APP_IMAGE:-ghcr.io/z4yed/real-estate-tasks:latest}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app-code:/var/www/html
      - app-storage:/var/www/html/storage
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:${APP_PORT:-8080}:80'
    volumes:
      - app-code:/var/www/html:ro
      - app-storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - app

  mysql:
    image: mysql/mysql-server:8.0
    restart: unless-stopped
    ports:
      - '127.0.0.1:${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-p${DB_PASSWORD}'
      retries: 5
      timeout: 5s

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 5
      timeout: 5s

networks:
  app-network:
    driver: bridge

volumes:
  app-code:
  app-storage:
  mysql-data:
  redis-data:
